<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>題庫列表</title>
    <link rel="stylesheet" href="style.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- Word Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.7.0/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        .layout {
            display: flex;
            gap: 20px;
        }

        .left-panel {
            width: 30%;
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 80vh;
            overflow-y: auto;
        }

        .right-panel {
            width: 70%;
        }

        .chapter-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
        }

        .chapter-item:hover {
            background: #f0f0f0;
        }

        .chapter-selected {
            background: #dfefff;
            font-weight: bold;
        }

        .stats-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .stats-number {
            color: #2980b9;
            cursor: pointer;
            font-weight: bold;
        }

        /* 彈跳視窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            width: 60%;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<script>
    if (sessionStorage.getItem("auth") !== "yes") {
        window.location.href = "login.html";
    }
</script>

<div class="navbar">
    <a href="index.html">首頁</a>
    <a href="list.html" class="active">題庫列表</a>
    <a href="add.html">新增題目</a>
</div>

<h1>題庫列表</h1>

<div class="layout">

    <!-- 左側章節列表 -->
    <div class="left-panel" id="chapter-list"></div>

    <!-- 右側：統計 + 題目表格 -->
    <div class="right-panel">

        <div class="stats-box" id="stats-box"></div>

        <table id="questionTable" class="display" style="width:100%; margin-top:20px;">
            <thead>
                <tr>
                    <th>選取</th>
                    <th>NO.</th>
                    <th>Question</th>
                    <th>Type</th>
                    <th>Type_simplify</th>
                    <th>Answer</th>
                    <th>Topic</th>
                    <th>Picture</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

    </div>
</div>

<!-- 彈跳視窗 -->
<div class="modal" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script src="script.js"></script>

</body>
</html>
