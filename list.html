<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>題庫列表</title>
    <link rel="stylesheet" href="style.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- Word Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.7.0/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* Select2 主題色 */
        .select2-container--default .select2-selection--multiple {
            border: 1px solid #3498db;
            min-height: 42px;
            padding: 5px;
        }
        .select2-container--default .select2-selection--multiple .select2-selection__choice {
            background-color: #3498db;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .select2-container--default .select2-results__option--highlighted {
            background-color: #2980b9 !important;
            color: white;
        }
        .select2-container--default .select2-results__option--selected {
            background-color: #3498db !important;
            color: white;
        }

        /* 篩選區塊 */
        #filter-panel {
            display: none;
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .top-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="index.html">首頁</a>
    <a href="list.html" class="active">題庫列表</a>
    <a href="add.html">新增題目</a>
</div>

<h1>題庫列表</h1>

<!-- 上方功能鍵 -->
<div class="top-actions">
    <button onclick="toggleFilter()">篩選題目</button>
    <button onclick="addSelectedQuestions()">加入題目</button>
    <button onclick="openSelectedModal()">查看所選題目</button>
</div>

<!-- 篩選區塊（預設隱藏） -->
<div id="filter-panel">
    <label>選擇章節</label>
    <select id="topic-select" multiple="multiple" style="width:100%; margin-bottom:20px;"></select>

    <label>選擇題型</label>
    <select id="type-select" multiple="multiple" style="width:100%;"></select>
</div>

<!-- 題目表格 -->
<table id="questionTable" class="display" style="width:100%; margin-top:20px;">
    <thead>
        <tr>
            <th>選取</th>
            <th>NO.</th>
            <th>Question</th>
            <th>Type</th>
            <th>Type_simplify</th>
            <th>Answer</th>
            <th>Topic</th>
            <th>Picture</th>
            <th>Date</th>
            <th>修改</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<!-- 查看所選題目 -->
<div class="modal" id="selected-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeSelectedModal()">✖</span>
        <h2>已選題目</h2>
        <div id="selected-list"></div>
        <button onclick="exportWord()">匯出 Word</button>
    </div>
</div>

<!-- 修改題目 -->
<div class="modal" id="edit-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeEditModal()">✖</span>
        <h2>修改題目</h2>
        <div id="edit-form"></div>
        <button onclick="saveEdit()">儲存修改</button>
    </div>
</div>

<script src="script.js"></script>

<script>
function toggleFilter() {
    const panel = document.getElementById("filter-panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
