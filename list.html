<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>題庫列表</title>
    <link rel="stylesheet" href="style.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- Word Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.7.0/docx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        /* ====== 左右分欄 ====== */
        .layout {
            display: flex;
            gap: 20px;
            width: 95%;
            margin: 0 auto;
        }

        /* ====== 左側章節列表（可折疊） ====== */
        .left-panel {
            width: 260px;
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            height: 80vh;
            overflow-y: auto;
            transition: width 0.3s ease, padding 0.3s ease;
            position: relative;
        }

        .left-panel.collapsed {
            width: 55px;
            padding-left: 10px;
            padding-right: 10px;
            overflow: hidden;
        }

        #toggle-btn {
            position: absolute;
            top: 10px;
            right: -15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .chapter-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-item:hover {
            background: #f0f0f0;
        }

        .chapter-selected {
            background: #dfefff;
            font-weight: bold;
        }

        /* ====== 右側 ====== */
        .right-panel {
            flex: 1;
        }

        /* ====== 上方功能鍵 ====== */
        .top-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stats-box {
            background: #ffffff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .stats-number {
            color: #2980b9;
            cursor: pointer;
            font-weight: bold;
        }

        /* ====== 彈跳視窗 ====== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content {
            background: white;
            width: 60%;
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<script>
    if (sessionStorage.getItem("auth") !== "yes") {
        window.location.href = "login.html";
    }
</script>

<div class="navbar">
    <a href="index.html">首頁</a>
    <a href="list.html" class="active">題庫列表</a>
    <a href="add.html">新增題目</a>
</div>

<h1>題庫列表</h1>

<div class="layout">

    <!-- 左側章節列表 -->
    <div class="left-panel" id="left-panel">
        <button id="toggle-btn">☰</button>
        <div id="chapter-list"></div>
    </div>

    <!-- 右側：功能鍵 + 統計 + 題目表格 -->
    <div class="right-panel">

        <!-- 功能鍵移到上方 -->
        <div class="top-actions">
            <button onclick="exportWord()">匯出 Word</button>
            <button onclick="saveEdits()">儲存修改</button>
        </div>

        <div class="stats-box" id="stats-box"></div>

        <table id="questionTable" class="display" style="width:100%; margin-top:20px;">
            <thead>
                <tr>
                    <th>選取</th>
                    <th>NO.</th>
                    <th>Question</th>
                    <th>Type</th>
                    <th>Type_simplify</th>
                    <th>Answer</th>
                    <th>Topic</th>
                    <th>Picture</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

    </div>
</div>

<!-- 彈跳視窗 -->
<div class="modal" id="modal">
    <div class="modal-content" id="modal-content"></div>
</div>

<script src="script.js"></script>

<!-- 左側折疊功能 -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const leftPanel = document.getElementById("left-panel");
    const toggleBtn = document.getElementById("toggle-btn");

    toggleBtn.addEventListener("click", () => {
        leftPanel.classList.toggle("collapsed");
    });
});
</script>

</body>
</html>
