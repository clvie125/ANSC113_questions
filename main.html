<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>題庫管理</title>
</head>
<body>

<h1>題庫管理</h1>

<!-- 題目列表 -->
<div id="question-list"></div>

<hr>

<h2>新增題目</h2>
<div id="editor">
    <input id="q_no" placeholder="NO.">
    <input id="q_question" placeholder="Question">
    <input id="q_type" placeholder="Type">
    <input id="q_type_s" placeholder="Type_simplify">
    <input id="q_answer" placeholder="Answer">
    <input id="q_topic" placeholder="Topic">
    <input id="q_pic" placeholder="Picture No.">
    <input id="q_date" placeholder="Add Date">
    <button onclick="addQuestion()">新增題目</button>
</div>

<script src="script.js"></script>

</body>
</html>
